<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Beat Makinesi - Çalışan Versiyon</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #0a0a0a;
            color: white;
            padding: 30px;
        }
        h1 { color: #1ed760; }
        #startBtn {
            font-size: 28px;
            padding: 20px 40px;
            margin: 20px;
            background: #ff4444;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
        }
        .drum {
            font-size: 42px;
            padding: 25px;
            margin: 10px;
            width: 120px;
            height: 120px;
            border-radius: 20px;
            cursor: pointer;
        }
        .kick { background: #ff4444; }
        .snare { background: #ffaa00; }
        .clap { background: #ff44aa; }
        .hihat { background: #44ffdd; }
        .ohat { background: #aa88ff; }

        #play { 
            font-size: 24px; 
            padding: 15px 50px; 
            background: #1ed760; 
            color: black; 
            border: none;
            border-radius: 50px;
            margin: 20px;
        }
    </style>
</head>
<body>
    <h1>🥁 Beat Makinesi</h1>
    <p>Önce aşağıdaki butona bas (sesi açmak için zorunlu)</p>
    
    <button id="startBtn">🔊 SESİ AÇ</button>
    <br><br>

    <button id="play" style="display:none">▶ PLAY / STOP</button>
    
    <div id="drums" style="display:none">
        <button class="drum kick" onclick="playDrum('kick')">KICK</button>
        <button class="drum snare" onclick="playDrum('snare')">SNARE</button>
        <button class="drum clap" onclick="playDrum('clap')">CLAP</button><br>
        <button class="drum hihat" onclick="playDrum('hihat')">HI-HAT</button>
        <button class="drum ohat" onclick="playDrum('ohat')">OPEN HAT</button>
    </div>

    <script>

        let isPlaying = false;

        const startBtn = document.getElementById('startBtn');
        const playBtn = document.getElementById('play');
        const drumsDiv = document.getElementById('drums');

        startBtn.addEventListener('click', () => {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            audioContext.resume().then(() => {
                startBtn.style.display = 'none';
                playBtn.style.display = 'inline-block';
                drumsDiv.style.display = 'block';
                alert('✅ Ses açıldı! Artık butonları kullanabilirsin.');
            });
        });
